<div class="manage-page">
  <div class="manage-nav-shell">
    <div class="manage-nav" #navContainer>

      <ul class="manage-nav-list">
        @for (tab of visibleTabs; track tab.link) {
          <li class="nav-item">
            <a
              [routerLink]="tab.link"
              routerLinkActive="active"
              class="nav-link manage-nav-link d-flex align-items-center"
            >
              <i [class]="tab.icon + ' me-2'"></i>
              <span>{{ tab.label }}</span>
            </a>
          </li>
        }

        @if (overflowTabs.length > 0) {
          <li class="nav-item more-menu" [class.open]="isMoreOpen">
            <button
              type="button"
              class="nav-link manage-nav-link more-btn d-flex align-items-center"
              (click)="toggleMoreMenu()"
            >
              <i class="bi bi-three-dots me-2"></i>
            </button>

            @if (isMoreOpen) {
              <div class="more-dropdown shadow-lg">
                @for (tab of overflowTabs; track tab.link) {
                  <a
                    [routerLink]="tab.link"
                    routerLinkActive="active"
                    class="more-dropdown-item"
                    (click)="closeMoreMenu()"
                  >
                    <i [class]="tab.icon + ' me-2'"></i>
                    <span>{{ tab.label }}</span>
                  </a>
                }
              </div>
            }
          </li>
        }
      </ul>

    </div>
  </div>

  <div class="manage-content">
    <router-outlet></router-outlet>
  </div>
</div>
