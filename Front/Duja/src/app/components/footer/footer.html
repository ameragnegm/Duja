<footer class="footer-wrapper mt-0">
  <div class="container py-5">
    <div class="row align-items-center gy-5">

      <!-- LOGO -->
      <div class="col-12 col-md-4 text-center text-md-start">
        <img
          src="assets/duja_white_transparent.png"
          alt="Duja Logo"
          class="footer-logo img-fluid"
        >
      </div>

      @if (brandservice.brandInfo(); as brandInfo) {

      <!-- FOLLOW US -->
      <div class="col-12 col-md-4 text-center">
        <h6 class="footer-heading">Follow Us</h6>

        <div class="footer-socials">
          @if (brandInfo.instagramUrl) {
            <a
              [href]="brandInfo.instagramUrl"
              target="_blank"
              class="footer-icon"
              aria-label="Instagram"
            >
              <i class="bi bi-instagram"></i>
            </a>
          }

          @if (brandInfo.tikTokUrl) {
            <a
              [href]="brandInfo.tikTokUrl"
              target="_blank"
              class="footer-icon"
              aria-label="TikTok"
            >
              <i class="bi bi-tiktok"></i>
            </a>
          }
        </div>
      </div>

      <!-- CONTACT -->
      <div class="col-12 col-md-4 text-center">
        <h6 class="footer-heading">Contact Us</h6>

        <div class="footer-contact">

          @if (brandInfo.phone) {
            <a
              [href]="'https://wa.me/' + cleanWhatsApp(brandInfo.whatsApp)"
              target="_blank"
              class="footer-link"
            >
              <i class="bi bi-phone me-2"></i>
              {{ brandInfo.phone }}
            </a>
          }

          @if (brandInfo.whatsApp) {
            <a
              [href]="'https://wa.me/' + cleanWhatsApp(brandInfo.whatsApp)"
              target="_blank"
              class="footer-link"
            >
              <i class="bi bi-whatsapp me-2"></i>
              {{ brandInfo.whatsApp }}
            </a>
          }

        </div>
      </div>

      } @else {
        <div class="col-12 col-md-8 text-center text-md-start">
          <p class="text-secondary mb-0">Loading brand info...</p>
        </div>
      }

    </div>
  </div>
</footer>
